name: Waka Readme

on:
  schedule:
    # Runs at 12am UTC every day
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update README stats via PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout main
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: main
          token: ${{ secrets.WAKA_PAT || github.token }}

      - name: Fetch WakaTime stats and update dashboard
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          WAKATIME_TIMEZONE: ${{ vars.WAKATIME_TIMEZONE || 'America/New_York' }}
        run: |
          set -euo pipefail

          AUTH="$(printf '%s' "$WAKATIME_API_KEY" | base64 | tr -d '\n')"
          END_DATE="$(TZ="$WAKATIME_TIMEZONE" date +%Y-%m-%d)"
          START_DATE="$(TZ="$WAKATIME_TIMEZONE" date -d "$END_DATE - 6 days" +%Y-%m-%d)"
          SUMMARIES_FILE="$(mktemp -t waka_summaries.XXXXXX.json)"
          README_CANDIDATE="$(mktemp -t waka_readme.XXXXXX.md)"
          SVG_CANDIDATE="$(mktemp -t waka_dashboard.XXXXXX.svg)"

          cleanup() {
            rm -f "$SUMMARIES_FILE" "$README_CANDIDATE" "$SVG_CANDIDATE"
          }
          trap cleanup EXIT

          WAKA_REFRESHED=false
          cp README.md "$README_CANDIDATE"
          echo "Fetching seven calendar dates from $START_DATE to $END_DATE in $WAKATIME_TIMEZONE"

          if curl -fsS -G \
              --retry 2 \
              --retry-all-errors \
              --connect-timeout 15 \
              --max-time 60 \
              -H "Authorization: Basic $AUTH" \
              --data-urlencode "start=$START_DATE" \
              --data-urlencode "end=$END_DATE" \
              --data-urlencode "timezone=$WAKATIME_TIMEZONE" \
              -o "$SUMMARIES_FILE" \
              "https://api.wakatime.com/api/v1/users/current/summaries" && \
            python3 scripts/generate_waka_dashboard.py \
              --input "$SUMMARIES_FILE" \
              --svg-output "$SVG_CANDIDATE" \
              --readme "$README_CANDIDATE" \
              --expected-start "$START_DATE" \
              --expected-end "$END_DATE"; then
            mv "$SVG_CANDIDATE" profile/wakatime-dashboard.svg
            mv "$README_CANDIDATE" README.md
            WAKA_REFRESHED=true
          else
            echo "::warning title=WakaTime refresh skipped::Keeping the last successful dashboard and README details."
          fi
          echo "WAKA_REFRESHED=$WAKA_REFRESHED" >> "$GITHUB_ENV"

      - name: Generate GitHub profile cards
        env:
          GITHUB_TOKEN: ${{ secrets.WAKA_PAT || github.token }}
        run: |
          python3 scripts/generate_profile_stats.py \
            --username "${{ github.repository_owner }}" \
            --output-dir profile

      - name: Validate generated cards
        shell: bash
        run: |
          set -euo pipefail

          for card in \
            profile/github-stats.svg \
            profile/top-languages.svg \
            profile/wakatime-dashboard.svg; do
            test -s "$card"
            python3 scripts/generate_waka_dashboard.py --validate-svg "$card"

            if grep -Eq 'Something went wrong|No GitHub API tokens found|Maximum retries exceeded' "$card"; then
              echo "ERROR: $card contains a renderer error"
              exit 1
            fi
          done

          if [[ "${WAKA_REFRESHED:-false}" == "true" ]] && \
            grep -q 'First automated refresh pending' profile/wakatime-dashboard.svg; then
            echo "ERROR: WakaTime dashboard did not receive daily activity"
            exit 1
          fi

          if grep -Eq 'Public Commits|Pull Requests|Issues Opened' profile/github-stats.svg; then
            echo "ERROR: GitHub summary contains a metric that is not proven public-only"
            exit 1
          fi

          grep -q 'Public Project Code Composition' profile/top-languages.svg
          grep -q 'Not a proficiency ranking' profile/top-languages.svg
          grep -q 'Last successful refresh' profile/wakatime-dashboard.svg
          if grep -q '>Projects<' profile/wakatime-dashboard.svg; then
            echo "ERROR: WakaTime project names must not be published"
            exit 1
          fi

      - name: Create or update PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.WAKA_PAT || github.token }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BASE_BRANCH="main"
          HEAD_BRANCH="waka-readme"
          REPO="$GITHUB_REPOSITORY"

          fetch_head_branch_if_exists() {
            local ls_remote_status=0
            git ls-remote --exit-code --heads origin "$HEAD_BRANCH" >/dev/null 2>&1 || ls_remote_status=$?

            if [ "$ls_remote_status" -eq 0 ]; then
              git fetch origin "$HEAD_BRANCH"
            elif [ "$ls_remote_status" -eq 2 ]; then
              echo "Info: Remote branch $HEAD_BRANCH does not exist yet (first run)."
            else
              echo "ERROR: Failed to query remote branch $HEAD_BRANCH (git ls-remote exit $ls_remote_status)."
              exit 1
            fi
          }

          fetch_head_branch_if_exists
          git checkout -B "$HEAD_BRANCH"

          CURRENT_BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          if [ "$CURRENT_BRANCH" != "$HEAD_BRANCH" ]; then
            echo "ERROR: Expected to be on $HEAD_BRANCH but on $CURRENT_BRANCH"
            exit 1
          fi

          git add \
            README.md \
            profile/github-stats.svg \
            profile/top-languages.svg \
            profile/wakatime-dashboard.svg

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(waka): refresh public profile statistics"

          git fetch origin "$BASE_BRANCH" --depth=1 || true
          if git diff --quiet "origin/$BASE_BRANCH"...HEAD; then
            echo "No diff vs $BASE_BRANCH; skipping PR."
            echo "No PR needed; deleting remote branch $HEAD_BRANCH to avoid orphaned branch."
            git push origin HEAD:"$HEAD_BRANCH" --force-with-lease
            git push origin --delete "$HEAD_BRANCH" || echo "Warning: Failed to delete remote branch $HEAD_BRANCH"
            exit 0
          fi

          fetch_head_branch_if_exists
          git push origin HEAD:"$HEAD_BRANCH" --force-with-lease

          # Create PR body in temp file (printf pattern avoids YAML heredoc parsing issues)
          TEMP_BODY="$(mktemp -t "waka_pr_body.XXXXXX")"
          cleanup() { rm -f "$TEMP_BODY"; }
          trap cleanup EXIT

          TIMESTAMP="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          printf '%s\n' \
            "Automated refresh of public profile cards from GitHub Actions." \
            "" \
            "**Stats Include:**" \
            "- Public GitHub summary" \
            "- Public project code composition from GitHub Linguist bytes" \
            "- Seven-day WakaTime editor activity dashboard" \
            "- WakaTime language breakdown" \
            "- Editors used" \
            "- Operating systems" \
            "- WakaTime activity classifications" \
            "- Project names intentionally omitted from public output" \
            "" \
            "_Updated: ${TIMESTAMP}_" \
            > "$TEMP_BODY"

          PR_NUMBER=$(gh pr list --repo "$REPO" --head "$HEAD_BRANCH" --state open --json number -q '.[0].number' || true)

          if [ -z "${PR_NUMBER:-}" ] || [ "$PR_NUMBER" = "null" ]; then
            PR_URL=$(gh pr create --repo "$REPO" --base "$BASE_BRANCH" --head "$HEAD_BRANCH" \
              --title "chore(waka): update waka stats" \
              --body-file "$TEMP_BODY")
            PR_NUMBER=$(gh pr view "$PR_URL" --repo "$REPO" --json number -q .number)
          else
            gh pr edit "$PR_NUMBER" --repo "$REPO" --title "chore(waka): update waka stats" --body-file "$TEMP_BODY"
          fi

          if [ -z "${PR_NUMBER:-}" ]; then
            echo "ERROR: Failed to create/find PR for $HEAD_BRANCH -> $BASE_BRANCH"
            exit 1
          fi

          STATE=$(gh pr view --repo "$REPO" "$PR_NUMBER" --json state -q .state)
          if [ "$STATE" != "OPEN" ]; then
            echo "ERROR: PR #$PR_NUMBER is not OPEN (state=$STATE). Head branch may have been deleted or PR closed."
            exit 1
          fi

          HEAD_SHA=$(git rev-parse HEAD)
          QUALITY_RUN_COUNT=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs" --jq '[.check_runs[] | select(.name == "quality")] | length')

          # Fallback dispatch only when no Quality Gate run exists yet for this head SHA.
          if [ "$QUALITY_RUN_COUNT" -gt 0 ]; then
            echo "Quality Gate already present for $HEAD_SHA; skipping workflow_dispatch fallback."
          else
            echo "No Quality Gate run found for $HEAD_SHA; dispatching quality.yml fallback on $HEAD_BRANCH."
            if ! gh workflow run quality.yml --repo "$REPO" --ref "$HEAD_BRANCH"; then
              echo "ERROR: Failed to dispatch quality.yml fallback on $HEAD_BRANCH branch."
              exit 1
            fi
          fi

          # Enable auto-merge (checks will be verified by GitHub before merging)
          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash --delete-branch
          echo "Auto-merge requested for PR #$PR_NUMBER"
          echo "Quality Gate status confirmed (existing run or fallback dispatch) and will be verified before merge."
