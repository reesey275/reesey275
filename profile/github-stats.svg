    .value { fill: #ffffff; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .muted { fill: #8b949e; font: 400 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>
  <rect x="0.5" y="0.5" width="494" height="214" rx="6"
